backend:
  name: git-gateway
  branch: main

# Where uploaded images are stored in the repo
media_folder: "images/watches"
# The URL path for accessing uploaded images
public_folder: "/images/watches"

# Polish UI
collections:
  - name: "products"
    label: "Produkty"
    file: "csvjson.json"
    format: json
    extension: json
    description: "Zarządzaj katalogiem zegarków i smartwatchy"
    fields:
      - name: "products"
        label: "Lista Produktów"
        widget: list
        collapsed: false
        summary: "{{fields.SKU}} — {{fields.Model}} ({{fields.Ilosc}} szt.)"
        fields:
          - name: "SKU"
            label: "SKU"
            widget: "string"
            hint: "Unikalny kod produktu, np. ZS-14"
          - name: "Model"
            label: "Model"
            widget: "string"
            hint: "Nazwa modelu, np. X-100"
          - name: "Kategoria"
            label: "Kategoria"
            widget: "string"
            hint: "np. zegarki-smartwatch, sluchawki, powerbanki"
          - name: "Kolor"
            label: "Kolor"
            widget: "string"
            required: false
            hint: "np. BLACK / SILVER"
          - name: "Ilosc"
            label: "Ilość na stanie"
            widget: "number"
            value_type: "int"
            min: 0
            default: 0
          - name: "Cena"
            label: "Cena (PLN)"
            widget: "number"
            value_type: "float"
            required: false
            hint: "np. 199.99. Zostaw puste jeśli brak ceny."
          - name: "Zdjecia"
            label: "Zdjęcia"
            widget: "string"
            hint: "Nazwy plików oddzielone przecinkami: zdjecie1.jpg, zdjecie2.jpg"
          - name: "Opis"
            label: "Opisy w językach"
            widget: "object"
            collapsed: false
            fields:
              - name: "pl"
                label: "Polski"
                widget: "text"
              - name: "en"
                label: "English"
                widget: "text"
              - name: "ru"
                label: "Русский"
                widget: "text"
              - name: "kk"
                label: "Қазақша"
                widget: "text"
              - name: "ne"
                label: "नेपाली"
                widget: "text"
